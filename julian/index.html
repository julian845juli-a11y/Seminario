<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX STORE | Iniciar Sesión</title>

    <link rel="stylesheet" href="style.css">

    <!-- Iconos -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body class="login-body">

<div class="login-container">

    <div class="login-left">
        <h1>🏍 MOTOCROSS LAND</h1>

        <h2>Todo para Motocross</h2>

        <p>
            Cascos, Jerseys, Botas, Goggles,
            Llantas y Accesorios.
        </p>
    </div>

    <div class="login-right">

        <h2>Iniciar Sesión</h2>

        <form id="loginForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required>

            </div>

            <button type="submit" class="btn">
                Iniciar Sesión
            </button>

        </form>

        <hr>

        <h3>Crear Cuenta</h3>

        <form id="registroForm">

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                type="text"
                id="nuevoUsuario"
                placeholder="Nuevo Usuario"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                type="text"
                id="correo"
                placeholder="Correo"
                required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                type="password"
                id="nuevaPassword"
                placeholder="Contraseña"
                required>

            </div>

            <button class="btn2">
                Registrarse
            </button>

        </form>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>

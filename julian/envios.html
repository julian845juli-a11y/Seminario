<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX STORE | Datos de Envío</title>

<link rel="stylesheet" href="envios.css">

</head>

<body>

<header>

<h1>🏍 MX STORE</h1>

<nav>

<a href="inicio.html">Inicio</a>

<a href="carrito.html">Carrito</a>

<a href="perfil.html">Perfil</a>

</nav>

</header>

<div class="container">

<h2>📦 Datos de Envío</h2>

<form id="envioForm">

<div class="form-grid">

<div class="input-group">
<label>Nombre Completo</label>
<input type="text" id="nombre" required>
</div>

<div class="input-group">
<label>Teléfono</label>
<input type="tel" id="telefono" required>
</div>

<div class="input-group">
<label>Código Postal</label>
<input type="text" id="cp" required>
</div>

<div class="input-group">
<label>Estado</label>
<input type="text" id="estado" required>
</div>

<div class="input-group">
<label>Municipio</label>
<input type="text" id="municipio" required>
</div>

<div class="input-group">
<label>Colonia</label>
<input type="text" id="colonia" required>
</div>

<div class="input-group">
<label>Calle</label>
<input type="text" id="calle" required>
</div>

<div class="input-group">
<label>Número</label>
<input type="text" id="numero" required>
</div>

<div class="input-group full">
<label>Referencias</label>
<textarea id="referencias"></textarea>
</div>

</div>

<button type="submit">
Continuar al Pago
</button>

</form>

</div>

<script src="envios.js"></script>

</body>
</html>

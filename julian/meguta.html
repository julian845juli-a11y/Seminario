<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX STORE | Favoritos</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
    background:#000;
    border-bottom:3px solid orange;
}

header h1{
    color:orange;
}

header nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    transition:.3s;
}

header nav a:hover{
    color:orange;
}

main{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

main h2{
    margin-bottom:30px;
}

#listaFavoritos{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    background:#1e1e1e;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:20px;
}

.info h3{
    margin-bottom:10px;
}

.precio{
    color:orange;
    font-size:22px;
    margin:10px 0;
}

.botones{
    display:flex;
    gap:10px;
}

.botones button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.agregar{
    background:orange;
    color:white;
}

.eliminar{
    background:red;
    color:white;
}

.vacio{
    text-align:center;
    margin-top:80px;
    font-size:24px;
    color:#ccc;
}

</style>

</head>
<body>

<header>

<h1>❤️ MX STORE</h1>

<nav>

<a href="inicio.html">Inicio</a>

<a href="carrito.html">🛒 Carrito</a>

<a href="perfil.html">👤 Perfil</a>

</nav>

</header>

<main>

<h2>Mis Productos Favoritos</h2>

<div id="listaFavoritos"></div>

</main>

<script src="favoritos.js"></script>

</body>
</html>
